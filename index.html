<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Витрина комплектующих — Сборка ПК</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --hint: #757575;
            --btn: #2481cc;
            --btn-text: #ffffff;
            --sec-bg: #f0f2f5;
            --accent: #31b545;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1c1d;
                --text: #ffffff;
                --hint: #999;
                --sec-bg: #2c2c2e;
            }
        }

        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 100px; 
        }
        
        /* Шапка */
        .header { 
            position: sticky; top: 0; 
            background: var(--bg); 
            z-index: 100; 
            padding: 12px; 
            border-bottom: 1px solid var(--sec-bg); 
        }
        .search-box { 
            width: 100%; padding: 12px; 
            border-radius: 12px; border: none; 
            background: var(--sec-bg); color: var(--text); 
            margin-bottom: 10px; box-sizing: border-box; 
            outline: none; font-size: 15px; 
        }
        .controls { display: flex; gap: 8px; }
        .btn-select {
            flex: 1; height: 40px;
            background-color: var(--sec-bg); color: var(--text);
            border: 1px solid rgba(0,0,0,0.1); border-radius: 10px;
            padding: 0 10px; cursor: pointer;
        }

        /* Сетка товаров */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { 
            background: var(--sec-bg); border-radius: 15px; 
            overflow: hidden; display: flex; flex-direction: column; 
            border: 1px solid rgba(0,0,0,0.05); position: relative;
        }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .stock-tag { 
            position: absolute; top: 6px; right: 6px; 
            background: rgba(0,0,0,0.6); color: #fff; 
            padding: 2px 8px; border-radius: 8px; font-size: 10px; 
        }

        .info { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; }
        .title { 
            font-weight: bold; font-size: 14px; line-height: 1.2; 
            min-height: 2.4em; margin-bottom: 8px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .desc-list { font-size: 11px; color: var(--hint); list-style: none; padding: 0; margin: 0 0 10px 0; }
        .desc-list li::before { content: "• "; color: var(--btn); }

        .price { font-weight: 800; color: var(--accent); font-size: 16px; margin-top: auto; margin-bottom: 8px; }
        
        .add-btn { 
            background: var(--btn); color: var(--btn-text); 
            border: none; width: 100%; padding: 10px; 
            border-radius: 10px; font-weight: 600; cursor: pointer;
        }
        .add-btn:disabled { background: #999; }

        /* Корзина */
        #cart-page { 
            position: fixed; top: 0; left: 100%; width: 100%; height: 100%; 
            background: var(--bg); z-index: 200; transition: 0.3s; 
            padding: 20px; box-sizing: border-box; overflow-y: auto; 
        }
        #cart-page.active { left: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--sec-bg); }
        
        .total-row { margin: 20px 0; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; }

        /* Кнопки действий */
        .main-btn { 
            background: var(--btn); color: var(--btn-text); 
            border: none; width: calc(100% - 30px); padding: 16px;
